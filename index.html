<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blacklight Protocol: Breachline</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="screenFx">
    <div id="vignette"></div>
    <div id="scanlines"></div>
  </div>
  <div id="hud">
    <div id="topBar">
      <div id="phase">PREP PHASE</div>
      <div id="timer">00:45</div>
      <div id="score">Vanguard 0 - 0 Bastion</div>
      <div id="round">Round 1 / 3</div>
    </div>

    <div id="leftPanel">
      <div id="health">HP 100</div>
      <div id="ammo">AMMO 30 / 90</div>
      <div id="stance">STAND</div>
      <div id="teamRole">ATTACKER · PLANBREAKER</div>
    </div>

    <div id="centerReticle">
      <div class="cross h"></div>
      <div class="cross v"></div>
    </div>

    <div id="objective">Objective: Locate Vault Nexus and plant the Rift Charge.</div>

    <div id="rightPanel">
      <div>Gadgets</div>
      <div id="gadgetA">[G] Breach Charge: 2</div>
      <div id="gadgetB">[F] Scout Pulse: Ready</div>
      <div id="intel">[5] Drone · [6] Cams</div>
      <div id="hint">LMB fire · RMB ADS · Q/E lean · V melee breach</div>
    </div>

    <div id="feed"></div>
    <div id="scoreboard" class="hidden"></div>
  </div>
  <canvas id="game"></canvas>

  <script type="module" src="main.js"></script>
</body>
</html>
